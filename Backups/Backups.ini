[Rainmeter]
Update=1000
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=9
colorBorder=122,28,172,255
colorLabel=173,73,225,205
colorData=235,211,248,255
colorStale=255,60,60,255
logFile=G:\My Drive\backups\%COMPUTERNAME%\backup_log.txt
notepadPP=C:\Program Files\Notepad++\notepad++.exe

[styleTitle]
StringAlign=Left
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorLabel#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorData#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

; Reads the raw date string and error indicator from XML
[MeasureBackupDate]
Measure=WebParser
URL=file://#@#backup_data.xml
RegExp=(?siU)<DT>(.*)</DT>.*<ER>(.*)</ER>
StringIndex=1
UpdateRate=1

; Reads the error indicator — "E" if error, empty otherwise
[MeasureBackupError]
Measure=WebParser
URL=file://#@#backup_data.xml
RegExp=(?siU)<DT>(.*)</DT>.*<ER>(.*)</ER>
StringIndex=2
UpdateRate=1

; Parses the date string into a Unix timestamp using TimeStamp measure
[MeasureBackupTime]
Measure=Time
TimeStamp=[MeasureBackupDate]
TimeStampFormat=%m/%d/%y %H:%M
DynamicVariables=1

; Gets current time as Unix timestamp
[MeasureNow]
Measure=Time

; Calculates age in seconds; triggers color change if > 86400 (24 hrs)
[MeasureBackupAge]
Measure=Calc
DynamicVariables=1
Formula=([MeasureNow:TimeStamp] - [MeasureBackupTime:TimeStamp])
IfCondition=MeasureBackupAge > 86400
IfTrueAction=[!SetVariable colorDateText "#colorStale#"][!UpdateMeter MeterBackupDate][!Redraw]
IfFalseAction=[!SetVariable colorDateText "#colorData#"][!UpdateMeter MeterBackupDate][!Redraw]

[MeterBack]
Meter=Shape
Shape=Rectangle 1,8,220,60,12 | StrokeWidth 1.5 | Stroke Color #colorBorder# | Fill Color 0,0,0,255
LeftMouseUpAction=["#notepadPP#" "#logFile#"]

[MeterTitle]
Meter=String
MeterStyle=styleTitle
X=12
Y=15
W=214
H=18
Text=Backups

[MeterBackupDate]
Meter=String
MeterStyle=styleLeftText
FontColor=#colorDateText#
DynamicVariables=1
X=12
Y=20r
W=150
H=14
MeasureName=MeasureBackupDate

[MeterBackupError]
Meter=String
MeterStyle=styleLeftText
FontColor=255,60,60,255
X=2R
Y=0r
W=20
H=14
MeasureName=MeasureBackupError
