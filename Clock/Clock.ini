[Rainmeter]
Update=1000
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=9
colorBorder=122,28,172,255
colorLabel=173,73,225,205
colorData=235,211,248,205

[styleTitle]
StringAlign=Left
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorLabel#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorData#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[MeasureGMTTime]
Measure=Time
Format=%H:%M:%S
TimeZone=0

[MeasureGMTDate]
Measure=Time
Format=%B %d, %Y
TimeZone=0

[MeterBack]
Meter=Shape
Shape=Rectangle 1,8,220,48,12 | StrokeWidth 1.5 | Stroke Color #colorBorder# | Fill Color 0,0,0,255

[MeterTitle]
Meter=String
MeterStyle=styleTitle
X=12
Y=15
W=214
H=18
Text=GMT

[MeterGMTDateTime]
Meter=String
MeterStyle=styleLeftText
X=12
Y=20r
W=214
H=14
MeasureName=MeasureGMTDate
MeasureName2=MeasureGMTTime
Text=%1  %2
