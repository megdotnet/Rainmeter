[Rainmeter]
Update=1000
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=9
colorText=224,222,244,205
grayText=169,169,169,205

[MeterString]
Meter=String

[styleTitle]
StringAlign=Left
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#grayText#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[styleRightText]
StringAlign=Right
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[MeasureDateTime]
Measure=Time
Format=%B %d, %Y

[MeasureClockTime]
Measure=Time
Format=%I:%M %p

[MeasureNow]
Measure=Time

[MeasureEnd]
Measure=Time
TimeStamp=6/1/2026 0:0:00
TimeStampFormat=%m/%d/%Y %H:%M:%S
Format=%D

[MeasureDaysLeft]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 86400)

[MeasureHoursLeft]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) - Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 86400) * 24

[MeasureMinsLeft]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 60) - Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) * 60

[MeasureSecsLeft]
Measure=Calc
DynamicVariables=1
Formula=Trunc([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) - Trunc(([MeasureEnd:TimeStamp] - [MeasureNow:TimeStamp]) / 60) * 60

[MeterBack]
Meter=Shape
Shape=Rectangle 1,8,190,100,12 | StrokeWidth 1.5 | Stroke Color 64,204,228,255 | Fill Color 0,0,0,255

[MeterDate]
Meter=String
MeterStyle=styleTitle
X=12
Y=15
W=190
H=16
MeasureName=MeasureDateTime

[MeterTime]
Meter=String
MeterStyle=styleLeftText
X=12
Y=34
W=190
H=16
MeasureName=MeasureClockTime

[TitleCountDown]
Meter=String
MeterStyle=styleTitle
X=12
Y=58
W=150
H=18
Text=Countdown

[MeterCountdown]
Meter=String
MeterStyle=styleLeftText
X=12
Y=20r
W=190
H=14
MeasureName=MeasureDaysLeft
MeasureName2=MeasureHoursLeft
MeasureName3=MeasureMinsLeft
MeasureName4=MeasureSecsLeft
NumOfDecimals=0
Text=%1d  %2h  %3m  %4s
InlineSetting=Color | #grayText#
InlinePattern=d|h|m|s
