[Rainmeter]
Update=1000
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=9
colorBorder=122,28,172,255
colorLabel=173,73,225,205
colorData=235,211,248,205

[MeterString]
Meter=String

[styleTitle]
StringAlign=Left
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorLabel#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorData#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[styleRightText]
StringAlign=Right
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorData#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[MeasureDateTime]
Measure=Time
Format=%B %d, %Y

[MeasureClockTime]
Measure=Time
Format=%I:%M %p

[MeasureNow]
Measure=Time

[MeasureEnd2]
Measure=Time
TimeStamp=6/1/2026 0:0:00
TimeStampFormat=%m/%d/%Y %H:%M:%S
Format=%D

[MeasureEndPDX]
Measure=Time
TimeStamp=5/8/2026 0:0:00
TimeStampFormat=%m/%d/%Y %H:%M:%S
Format=%D

[MeasureDaysLeft2]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 86400)

[MeasureHoursLeft2]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) - Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 86400) * 24
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeasureMinsLeft2]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 60) - Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) * 60
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeasureSecsLeft2]
Measure=Calc
DynamicVariables=1
Formula=Trunc([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) - Trunc(([MeasureEnd2:TimeStamp] - [MeasureNow:TimeStamp]) / 60) * 60
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeasureDaysLeftPDX]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 86400)

[MeasureHoursLeftPDX]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) - Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 86400) * 24
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeasureMinsLeftPDX]
Measure=Calc
DynamicVariables=1
Formula=Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 60) - Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 3600) * 60
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeasureSecsLeftPDX]
Measure=Calc
DynamicVariables=1
Formula=Trunc([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) - Trunc(([MeasureEndPDX:TimeStamp] - [MeasureNow:TimeStamp]) / 60) * 60
RegExpSubstitute=1
Substitute="^(\d)$":"0\1"

[MeterBack]
Meter=Shape
Shape=Rectangle 1,8,220,136,12 | StrokeWidth 1.5 | Stroke Color #colorBorder# | Fill Color 0,0,0,255

[MeterDate]
Meter=String
MeterStyle=styleTitle
X=12
Y=15
W=214
H=16
MeasureName=MeasureDateTime

[MeterTime]
Meter=String
MeterStyle=styleLeftText
X=12
Y=34
W=214
H=16
MeasureName=MeasureClockTime

[TitleCountDown2]
Meter=String
MeterStyle=styleTitle
X=12
Y=58
W=214
H=18
Text=Six One

[MeterCountdown2]
Meter=String
MeterStyle=styleLeftText
X=12
Y=20r
W=214
H=14
MeasureName=MeasureDaysLeft2
MeasureName2=MeasureHoursLeft2
MeasureName3=MeasureMinsLeft2
MeasureName4=MeasureSecsLeft2
NumOfDecimals=0
Text=%1d  %2:%3:%4
InlineSetting=Color | #colorLabel#
InlinePattern=d

[TitleCountDownPDX]
Meter=String
MeterStyle=styleTitle
X=12
Y=96
W=214
H=18
Text=PDX

[MeterCountdownPDX]
Meter=String
MeterStyle=styleLeftText
X=12
Y=20r
W=214
H=14
MeasureName=MeasureDaysLeftPDX
MeasureName2=MeasureHoursLeftPDX
MeasureName3=MeasureMinsLeftPDX
MeasureName4=MeasureSecsLeftPDX
NumOfDecimals=0
Text=%1d  %2:%3:%4
InlineSetting=Color | #colorLabel#
InlinePattern=d
